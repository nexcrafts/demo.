  body {

  .picker { text-align: center; margin-bottom: 1.25rem; }
  .picker h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 4px; }
  .picker p { font-size: 14px; color: #888; margin-bottom: 14px; }
  .picker-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .picker-tab {
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    border: 1.5px solid #ddd; border-radius: 24px;
    background: white; color: #777; cursor: pointer; transition: all .2s;
  }
  .picker-tab.active { color: white; border-color: transparent; }
  .picker-tab:hover:not(.active) { background: #f5f5f5; }

  .card {
    background: white;
    border-radius: 22px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.12);
    width: 100%;
    max-width: 460px;
    overflow: hidden;
  }
  /* PROFILE HEADER */
  .profile {
    padding: 22px 20px 16px;
    color: white;
    text-align: center;
    position: relative;
  }
  .profile-icon {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 10px;
  }
  .profile-name { font-size: 19px; font-weight: 800; margin-bottom: 2px; }
  .profile-tagline { font-size: 12.5px; opacity: .9; margin-bottom: 10px; }
  .profile-stats {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 10px;
    font-size: 11.5px; opacity: .95;
  }
  .profile-stats span { display: flex; align-items: center; gap: 4px; }
  .profile-row2 {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 14px;
    font-size: 11.5px; opacity: .95; margin-top: 6px;
  }
  .status-badge {
    background: rgba(255,255,255,0.22);
    padding: 2px 9px; border-radius: 12px; font-weight: 600;
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex; gap: 6px; overflow-x: auto; padding: 10px 12px;
    background: #fafafa; border-bottom: 1px solid #eee; scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex-shrink: 0; padding: 6px 13px; font-size: 12px; font-weight: 600;
    border: 1.5px solid #e5e5e5; border-radius: 18px; background: white;
    color: #666; cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .nav-tab:hover { background: #f0f0f0; }

  .messages {
    padding: 16px; height: 300px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg {
    max-width: 82%; padding: 10px 14px; font-size: 13.5px; line-height: 1.55;
    border-radius: 16px; white-space: pre-wrap; word-break: break-word;
  }
  .msg.bot { background: #f7f7f8; border: 1px solid #eee; color: #111; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.user { color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.typing { color: #aaa; font-style: italic; background: #f7f7f8; border: 1px solid #eee; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg b { font-weight: 700; }

  .book-btn-msg { align-self: flex-start; margin-top: 2px; }
  .book-btn-msg button {
    padding: 8px 18px; font-size: 13px; font-weight: 700;
    border: none; border-radius: 20px; color: white; cursor: pointer; transition: opacity .2s;
  }
  .book-btn-msg button:hover { opacity: .85; }

  .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px 4px; }
  .qbtn {
    padding: 6px 12px; font-size: 12px; border: 1.5px solid; border-radius: 20px;
    background: white; cursor: pointer; transition: all .15s; font-weight: 600;
  }

  .input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #f0f0f0; background: white; }
  .input-row input {
    flex: 1; padding: 10px 14px; font-size: 14px;
    border: 1.5px solid #e0e0e0; border-radius: 24px; outline: none; transition: border .2s;
  }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; color: white; border: none;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity .2s;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .footer { margin-top: 1rem; text-align: center; font-size: 12px; color: #aaa; }
  .footer a { text-decoration: none; font-weight: 600; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);

  .modal-overlay.open { display: flex; }
  .modal {

  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-header h2 { font-size: 16px; font-weight: 700; color: #111; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #aaa; line-height: 1; }
  .modal-close:hover { color: #333; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1.5px solid #e0e0e0;

  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .submit-btn { width: 100%; padding: 12px; font-size: 14px; font-weight: 700; border: none; border-radius: 12px; color: white; cursor: pointer; transition: opacity .2s; margin-top: 4px; }

function buildPicker() {
  const picker = document.getElementById('picker');
  picker.innerHTML = Object.keys(industries).map(key => {
    const d = industries[key];
    return `<button class="picker-tab${key==='salon'?' active':''}" data-ind="${key}" onclick="selectInd(this)">${d.icon} ${d.label}</button>`;
  }).join('');
}

function applyTheme(ind) {
  const t = themes[ind];
  document.getElementById('profile').style.background = `linear-gradient(135deg, ${t.primary}, ${t.dark})`;
  document.getElementById('sendBtn').style.background = t.primary;
  document.getElementById('submitBtn').style.background = t.primary;
  document.getElementById('successIcon').style.background = t.light;
  document.getElementById('footerLink').style.color = t.primary;
  const inp = document.getElementById('userInput');
  inp.onfocus = () => inp.style.borderColor = t.primary;
  inp.onblur  = () => inp.style.borderColor = '#e0e0e0';
  document.querySelectorAll('.picker-tab').forEach(b => {
    b.classList.remove('active');
    b.style.background = 'white'; b.style.color = '#777'; b.style.borderColor = '#ddd';
  });
  const ab = document.querySelector(`.picker-tab[data-ind="${ind}"]`);
  if (ab) { ab.classList.add('active'); ab.style.background = t.primary; ab.style.color = 'white'; ab.style.borderColor = t.primary; }
}

function selectInd(btn) {
  currentInd = btn.dataset.ind;
  loadChat();
}

function loadChat() {
  const d = industries[currentInd];
  document.getElementById('profileIcon').textContent = d.icon;
  document.getElementById('profileName').textContent = d.name;
  document.getElementById('profileTagline').textContent = d.tagline;
  document.getElementById('profileStats').innerHTML =
    `<span>⭐ ${d.rating} · ${d.reviews} reviews</span><span>📍 ${d.area}</span>`;
  document.getElementById('profileRow2').innerHTML =
    `<span class="status-badge">🕐 ${d.status}</span><span>📞 ${d.phone}</span><span>${d.serviceCount}</span>`;
  document.getElementById('navTabs').innerHTML = d.navTabs.map(t =>
    `<button class="nav-tab" onclick="navTabClick('${t.replace(/'/g, "\\'")}')">${t}</button>`
  ).join('');

  document.getElementById('msgs').innerHTML = '';
  document.getElementById('userInput').value = '';
  conversationHistory = [];
  bookingShown = false;
  applyTheme(currentInd);
  loadQuick();
  addMsg(d.welcome, 'bot');
}

function loadQuick() {
  const d = industries[currentInd];
  const t = themes[currentInd];
  document.getElementById('quickBtns').innerHTML = d.quick.map(q =>
    `<button class="qbtn" onclick="quickSend('${q.replace(/'/g, "\\'")}')"
      style="border-color:${t.qBtnBorder};color:${t.primary};"
      onmouseover="this.style.background='${t.light}'"
      onmouseout="this.style.background='white'">${q}</button>`
  ).join('');
}

function formatText(text) {
  // simple markdown bold support
  return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
}

function addMsg(text, type) {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = formatText(text);
  if (type === 'user') div.style.background = themes[currentInd].primary;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addBookBtn() {
  if (bookingShown) return;
  bookingShown = true;
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'book-btn-msg';
  const btn = document.createElement('button');
  btn.textContent = '📅 ' + bookBtnLabels[currentInd];
  btn.style.background = themes[currentInd].primary;
  btn.onclick = openModal;
  wrap.appendChild(btn);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

const bookingTriggers = ['book appointment','reserve table','site visit','free trial','reservation','appointment'];

function isBookingTrigger(text) {
  const clean = text.replace(/^[^\w]*\s*/u, '').trim().toLowerCase();
  return bookingTriggers.some(k => clean.includes(k));
}

function quickSend(text) {
  const clean = text.replace(/^[^\w]*\s*/u, '').trim() || text;
  if (isBookingTrigger(text)) {
    addMsg(clean, 'user');
    conversationHistory.push({ role: 'user', content: clean });
    openModal();
    return;
  }
  sendUserMsg(clean);
}

function navTabClick(text) {
  const clean = text.replace(/^[^\w]*\s*/u, '').trim() || text;
  if (isBookingTrigger(text)) {
    addMsg(clean, 'user');
    conversationHistory.push({ role: 'user', content: clean });
    openModal();
    return;
  }
  sendUserMsg(clean);
}

function sendMsg() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  sendUserMsg(text);
}

// Roman Urdu detection — common words/markers
const urduWords = ['kya','hai','hain','kaise','kahan','kab','chahiye','krna','karna','kro','karein','kren',
  'mujhe','ap','aap','batao','bata','acha','theek','kitna','kitne','price','rate','kahan','andar',
  'wala','wali','tha','thi','aur','nahi','nahin','han','haan','book','karwana','milta','milti',
  'kaha','kidhar','timing','waqt','samay','assalam','salam','shukriya','meharbani'];

function isRomanUrdu(text) {
  const words = text.toLowerCase().split(/\s+/);
  let score = 0;
  words.forEach(w => { if (urduWords.includes(w.replace(/[^\w]/g,''))) score++; });
  return score > 0;
}

function getBotReply(d, text) {
  const lower = text.toLowerCase();
  const ur = isRomanUrdu(text);

  const servicesList = d.services.map(s => '• ' + s).join('\n');

  // Industry-specific topic replies (Bridal, Spa, Emergency, Delivery, Agents, etc.)
  if (d.extraReplies) {
    for (const item of d.extraReplies) {
      if (item.kw.some(k => lower.includes(k))) {
        return ur ? item.ur : item.en;
      }
    }
  }

  // Booking intent
  const bookingKw = ['book','appoint','reserv','schedul','visit','trial','site visit','free trial','milna','aana','aana hai','karwana'];
  if (bookingKw.some(k => lower.includes(k))) {
    addBookBtn();
    return ur
      ? `Zaroor! Neeche diye gaye button par tap karein aur apni booking details fill karein. 📅`
      : `Sure! Please tap the button below to fill in your booking details. 📅`;
  }

  // Services/Menu/Plans/Listings intent
  const servicesKw = ['service','price','rate','fee','menu','plan','package','treatment','listing','cost','kitna','kitne','rates'];
  if (servicesKw.some(k => lower.includes(k))) {
    return ur
      ? `Yeh hain hamari ${d.servicesLabel}:\n${servicesList}\n\nBooking karna chahte hain? 😊`
      : `Here's our ${d.servicesLabel}:\n${servicesList}\n\nWould you like to book? 😊`;
  }

  // Timings intent
  const timingKw = ['timing','time','hour','open','close','band','khulta','khulti','waqt','samay'];
  if (timingKw.some(k => lower.includes(k))) {
    return ur
      ? `Hamara timing: ${d.timings}.\nAbhi: ${d.status} 🕐`
      : `Our timings: ${d.timings}.\nCurrently: ${d.status} 🕐`;
  }

  // Location intent
  const locationKw = ['locat','address','kahan','kidhar','map','area','where'];
  if (locationKw.some(k => lower.includes(k))) {
    return ur
      ? `Hum yahan located hain: 📍 ${d.location}.\nContact: ${d.phone}`
      : `We're located at 📍 ${d.location}.\nContact: ${d.phone}`;
  }

  // Reviews intent
  const reviewKw = ['review','rating','star'];
  if (reviewKw.some(k => lower.includes(k))) {
    return ur
      ? `Humari rating ⭐ ${d.rating}/5 hai (${d.reviews} reviews ke sath). Shukriya aapke trust ke liye! 🙏`
      : `We're rated ⭐ ${d.rating}/5 based on ${d.reviews} reviews. Thanks for your trust! 🙏`;
  }

  // Default
  return ur
    ? `Shukriya aapke sawal ke liye! Aap "${d.servicesLabel}", "Timings", ya "Location" ke baare mein pooch sakte hain. Ya seedha humein WhatsApp karein: ${d.phone} 😊`
    : `Thanks for reaching out! Feel free to ask about our "${d.servicesLabel}", "Timings", or "Location" — or message us directly on WhatsApp: ${d.phone} 😊`;
}

async function sendUserMsg(text) {
  addMsg(text, 'user');
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  const typingDiv = addMsg('Typing...', 'typing');
  typingDiv.id = 'typing-indicator';

  const d = industries[currentInd];

  await new Promise(r => setTimeout(r, 600 + Math.random() * 500));

  const reply = getBotReply(d, text);
  document.getElementById('typing-indicator')?.remove();
  addMsg(reply, 'bot');

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

// MODAL
function openModal() {
  const d = industries[currentInd];
  document.getElementById('modalTitle').textContent = modalTitles[currentInd];
  const sel = document.getElementById('fService');
  sel.innerHTML = d.services.map(s => `<option>${s}</option>`).join('');
  document.getElementById('formState').style.display = 'block';
  document.getElementById('successState').style.display = 'none';
  ['fName','fPhone','fDate','fTime','fNote'].forEach(id => document.getElementById(id).value = '');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('fDate').min = today;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function submitForm() {
  const name    = document.getElementById('fName').value.trim();
  const phone   = document.getElementById('fPhone').value.trim();
  const date    = document.getElementById('fDate').value;
  const time    = document.getElementById('fTime').value;
  const service = document.getElementById('fService').value;
  const note    = document.getElementById('fNote').value.trim();

  if (!name || !phone || !date || !time) { alert('Please fill in Name, Phone, Date and Time.'); return; }

  const d = industries[currentInd];
  const formattedDate = new Date(date).toLocaleDateString('en-PK', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Send to Formspree CRM
  fetch('https://formspree.io/f/mgobqozr', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      name, phone, date: formattedDate, time, service, note,
      industry: d.name,
      _subject: `New Booking — ${d.name} — ${name}`
    })
  }).catch(() => {});

  // WhatsApp message
  let waMsg = `*New Booking — ${d.name}*\n\n`;
  waMsg += `👤 *Name:* ${name}\n📞 *Phone:* ${phone}\n📅 *Date:* ${formattedDate}\n⏰ *Time:* ${time}\n🔖 *Service:* ${service}\n`;
  if (note) waMsg += `📝 *Note:* ${note}\n`;
  waMsg += `\nKindly confirm my appointment/booking. Thank you! 🙏`;

  document.getElementById('waLink').href = `https://wa.me/${d.waNumber}?text=${encodeURIComponent(waMsg)}`;
  document.getElementById('successMsg').textContent = `Booking received for ${name} on ${formattedDate} at ${time}. Tap below to confirm on WhatsApp.`;
  document.getElementById('formState').style.display = 'none';
  document.getElementById('successState').style.display = 'block';
  addMsg(`✅ Booking submitted! ${name} — ${formattedDate} at ${time}\nService: ${service}`, 'bot');
}

buildPicker();
loadChat();
</script>
